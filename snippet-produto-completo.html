<div id="sensualy-reviews-widget"></div>

<script>
(function () {
  var API_BASE = 'https://depoimentos.onrender.com';
  var PRODUCT_ID = (function() {
    var slug = window.location.pathname.replace(/^\/|\/$/g, '');
    return slug || window.location.hostname;
  })();
  var CONTAINER_ID = 'sensualy-reviews-widget';
  var currentPage = 1;
  var totalReviews = 0;
  var LIMIT = 15;

  var styles = '#sensualy-reviews-widget{font-family:sans-serif;box-sizing:border-box}#sensualy-reviews-widget{max-width:900px;margin:40px auto;padding:0 16px;color:#1a1a2e}.sr-section-title{font-size:18px;font-weight:700;color:#1a1a2e;margin-bottom:14px;border-bottom:2px solid #2563eb;padding-bottom:8px}.sr-summary{display:flex;align-items:center;gap:16px;background:#eff6ff;border-radius:10px;padding:16px;margin-bottom:16px;flex-wrap:wrap}.sr-score-big{font-size:44px;font-weight:900;color:#2563eb;line-height:1}.sr-stars-display{display:flex;gap:3px;margin:4px 0}.sr-star{font-size:18px}.sr-star.filled{color:#f4a800}.sr-star.empty{color:#ddd}.sr-total-label{font-size:12px;color:#888;margin-top:0}.sr-breakdown{flex:1;min-width:160px}.sr-bar-row{display:flex;align-items:center;gap:4px;margin-bottom:4px;font-size:12px}.sr-bar-label{width:8px;text-align:right;color:#555}.sr-bar-track{flex:1;height:5px;background:#bfdbfe;border-radius:99px;overflow:hidden}.sr-bar-fill{height:100%;background:#2563eb;border-radius:99px}.sr-bar-count{width:14px;color:#888}.sr-form-card{background:#fff;border:1px solid #bfdbfe;border-radius:10px;padding:16px;margin-bottom:16px}.sr-form-title{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:10px}.sr-field{margin-bottom:8px}.sr-label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:2px}.sr-input,.sr-textarea{width:100%;padding:8px;border:1.5px solid #93c5fd;border-radius:8px;font-size:14px;outline:none}.sr-input:focus,.sr-textarea:focus{border-color:#2563eb}.sr-textarea{resize:vertical;min-height:80px}.sr-stars-input{display:flex;gap:3px;margin-top:0}.sr-star-input{font-size:28px;color:#ddd;cursor:pointer;user-select:none}.sr-star-input.active{color:#f4a800}.sr-photo-label{display:flex;align-items:center;gap:10px;border:1px dashed #93c5fd;border-radius:8px;padding:10px;cursor:pointer;background:#f8fbff;font-size:13px;color:#888}.sr-photo-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.sr-photo-thumb{width:50px;height:50px;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid #bfdbfe}.sr-submit-btn{width:100%;padding:10px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}.sr-submit-btn:disabled{background:#ccc}.sr-msg{padding:8px;border-radius:6px;margin-bottom:8px;font-size:14px;display:none}.sr-msg.success{background:#e6f9ee;color:#1a7f3c}.sr-msg.error{background:#fdeaea;color:#c0392b}.sr-review-card{background:#fff;border:1px solid #bfdbfe;border-radius:10px;padding:16px;margin-bottom:14px}.sr-review-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}.sr-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#60a5fa);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}.sr-review-meta{flex:1}.sr-review-author{font-weight:700;font-size:13px;color:#1a1a2e}.sr-review-stars{display:flex;gap:2px}.sr-review-text{font-size:14px;color:#444;line-height:1.6;margin-bottom:8px}.sr-review-photos{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}.sr-review-photo{width:80px;height:80px;object-fit:cover;border-radius:8px;cursor:pointer;border:1px solid #bfdbfe}.sr-pagination{display:flex;justify-content:center;gap:6px;margin-top:20px;margin-bottom:24px;flex-wrap:wrap}.sr-page-btn{padding:6px 10px;border:1px solid #2563eb;border-radius:5px;background:#fff;color:#2563eb;cursor:pointer;font-size:13px;font-weight:600}.sr-page-btn.active{background:#2563eb;color:#fff}.sr-lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:99999;justify-content:center;align-items:center}.sr-lightbox.open{display:flex}.sr-lightbox img{max-width:90vw;max-height:90vh;border-radius:12px}.sr-lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer}.sr-empty{text-align:center;color:#aaa}'

  function injectStyles(){if(document.getElementById('sr-styles'))return;var s=document.createElement('style');s.id='sr-styles';s.textContent=styles;document.head.appendChild(s);}
  function starsHTML(r){var h='';for(var i=1;i<=5;i++)h+='<span class="sr-star '+(i<=r?'filled':'empty')+'">★</span>';return h;}
  function escapeHTML(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');}

  function renderSummary(stats){var avg=stats.average||0,total=stats.total||0,bd=stats.breakdown||{},bars='';for(var i=5;i>=1;i--){var c=bd[i]||0,pct=total>0?Math.round(c/total*100):0;bars+='<div class="sr-bar-row"><span class="sr-bar-label">'+i+'</span><span class="sr-star filled" style="font-size:13px">★</span><div class="sr-bar-track"><div class="sr-bar-fill" style="width:'+pct+'%"></div></div><span class="sr-bar-count">'+c+'</span></div>';}return'<div class="sr-summary"><div style="text-align:center"><div class="sr-score-big">'+(avg>0?avg.toFixed(1):'—')+'</div><div class="sr-stars-display">'+starsHTML(Math.round(avg))+'</div><div class="sr-total-label">'+total+' avaliações</div></div><div class="sr-breakdown">'+bars+'</div></div>';}

  function renderReviews(reviews){if(!reviews.length)return'<div class="sr-empty">Nenhum</div>';return reviews.map(function(r){var initial=r.author_name.trim()[0].toUpperCase();var pA=r.photos||[];var photosHtml=pA.length?'<div class="sr-review-photos">'+pA.map(function(u){return'<img class="sr-review-photo" src="'+u+'" onclick="window.__srLB(\''+u+'\')" alt=""/>';}).join('')+'</div>':'';return'<div class="sr-review-card"><div class="sr-review-header"><div class="sr-avatar">'+initial+'</div><div class="sr-review-meta"><div class="sr-review-author">'+escapeHTML(r.author_name)+'</div></div><div class="sr-review-stars">'+starsHTML(r.rating)+'</div></div><div class="sr-review-text">'+escapeHTML(r.comment)+'</div>'+photosHtml+'</div>';}).join('');}

  function renderPagination(page,total){var tp=Math.ceil(total/LIMIT);if(tp<=1)return'';var h='<div class="sr-pagination">';if(page>1)h+='<button class="sr-page-btn" onclick="window.__srPage('+(page-1)+')">&lt;</button>';for(var i=Math.max(1,page-2);i<=Math.min(tp,page+2);i++)h+='<button class="sr-page-btn'+(i===page?' active':'')+'" onclick="window.__srPage('+i+')">'+i+'</button>';if(page<tp)h+='<button class="sr-page-btn" onclick="window.__srPage('+(page+1)+')">&gt;</button>';return h+'</div>';}

  function showMsg(text,type){var el=document.getElementById('sr-form-msg');if(!el)return;el.textContent=text;el.className='sr-msg '+type;el.style.display='block';if(type==='success')setTimeout(function(){el.style.display='none';},6000);}

  function injectMiniStars(s){
    if(document.getElementById('sr-mini'))return;
    var a=s.average||0,t=s.total||0;
    var h=t>0?'<div id="sr-mini" style="display:flex;align-items:center;gap:5px;margin:4px 0 8px;cursor:pointer" onclick="document.getElementById(\'sensualy-reviews-widget\').scrollIntoView({behavior:\'smooth\'})">'+'<span style="font-size:16px;color:#f4a800">'+'\u2605'.repeat(Math.round(a))+'</span><span style="font-size:13px;font-weight:700;color:#2563eb">'+a.toFixed(1)+'</span><span style="font-size:12px;color:#999">('+t+')</span></div>':'<div id="sr-mini" style="display:flex;align-items:center;gap:5px;margin:4px 0 8px;font-size:13px;color:#999;">Sem avaliações</div>';
    var ti=document.querySelector('h1,.titulo-produto,[itemprop="name"]');
    if(ti)ti.insertAdjacentHTML('afterend',h);
  }

  function removeDefaultNoReviews(){
    document.querySelectorAll('*').forEach(function(el){
      if(el.id==='sr-mini'||el.closest('#sr-mini'))return;
      var tag=el.tagName;
      if(tag==='SCRIPT'||tag==='STYLE'||tag==='BODY'||tag==='HTML')return;
      if(el.textContent.trim().toLowerCase()==='sem avaliações'){
        el.style.display='none';
        var nx=el.nextElementSibling;
        if(nx&&(nx.tagName==='HR'||nx.tagName==='BR'))nx.style.display='none';
      }
    });
  }

  function watchNoReviews(){
    var ob=new MutationObserver(function(ms){
      ms.forEach(function(m){
        m.addedNodes.forEach(function(n){
          if(n.nodeType===1&&n.id!=='sr-mini'&&n.textContent.trim().toLowerCase()==='sem avaliações')removeDefaultNoReviews();
        });
      });
    });
    ob.observe(document.body,{childList:true,subtree:true});
  }

  function loadPage(page){currentPage=page;var listEl=document.getElementById('sr-list');if(!listEl)return;listEl.innerHTML='<div class="sr-empty">Carregando</div>';fetch(API_BASE+'/api/reviews?product_id='+encodeURIComponent(PRODUCT_ID)+'&page='+page+'&limit='+LIMIT).then(function(r){return r.json();}).then(function(d){totalReviews=d.stats.total;listEl.innerHTML=renderReviews(d.reviews)+renderPagination(page,totalReviews);var s=document.getElementById('sr-summary-container');if(s)s.innerHTML=renderSummary(d.stats);if(page===1)injectMiniStars(d.stats);}).catch(function(){listEl.innerHTML='<div class="sr-empty">Erro ao carregar.</div>';});}

  window.__srPage=loadPage;window.__srLB=function(url){var lb=document.getElementById('sr-lightbox');if(!lb)return;lb.querySelector('img').src=url;lb.classList.add('open');};

  function bindForm(){
    var sel=0;
    var stars=document.querySelectorAll('.sr-star-input');
    var hi=function(v){stars.forEach(function(x){x.classList.toggle('active',parseInt(x.dataset.v)<=v);});};
    stars.forEach(function(s){s.addEventListener('mouseover',function(){hi(parseInt(this.dataset.v));});s.addEventListener('mouseout',function(){hi(sel);});s.addEventListener('click',function(){sel=parseInt(this.dataset.v);hi(sel);});});
    var photoInput=document.getElementById('sr-photo');
    var photoGrid=document.getElementById('sr-photo-grid');
    var photoName=document.getElementById('sr-photo-name');
    photoInput.addEventListener('change',function(){var files=Array.from(this.files);photoGrid.innerHTML='';if(!files.length){photoName.textContent='Foto';return;}photoName.textContent=files.length+' fotos';files.forEach(function(f){var fr=new FileReader();fr.onload=function(e){var i=document.createElement('img');i.src=e.target.result;i.className='sr-photo-thumb';photoGrid.appendChild(i);};fr.readAsDataURL(f);});});
    document.getElementById('sr-submit-btn').addEventListener('click',function(){
      var author=document.getElementById('sr-author').value.trim();
      var comment=document.getElementById('sr-comment').value.trim();
      var photos=Array.from(document.getElementById('sr-photo').files);
      if(!author)return showMsg('Informe','error');
      if(!sel)return showMsg('Selecione','error');
      if(comment.length<10)return showMsg('Curto','error');
      var btn=document.getElementById('sr-submit-btn');
      btn.disabled=true;btn.textContent='Enviando...';
      function mkFd(){var fd=new FormData();fd.append('product_id',PRODUCT_ID);fd.append('author_name',author);fd.append('rating',sel);fd.append('comment',comment);if(photos.length>0)fd.append('photo',photos[0]);return fd;}
      function done(){btn.disabled=false;btn.textContent='Enviar';}
      function go(n){fetch(API_BASE+'/api/reviews',{method:'POST',body:mkFd()}).then(function(r){return r.json().then(function(d){return{s:r.status,d:d};});}).then(function(x){if(x.s===429){showMsg('Limite','error');done();return;}if(x.d.success){showMsg(x.d.message,'success');var cupom=document.getElementById('sr-cupom');if(cupom)cupom.style.display='block';document.getElementById('sr-author').value='';document.getElementById('sr-comment').value='';document.getElementById('sr-photo').value='';photoGrid.innerHTML='';photoName.textContent='Foto';sel=0;stars.forEach(function(s){s.classList.remove('active');});done();}else{showMsg(x.d.error||'Erro','error');done();}}).catch(function(){if(n<3){btn.textContent='...';setTimeout(function(){go(n+1);},8000);}else{showMsg('Erro','error');done();}});}
      go(1);
    });
  }

  function init(){
    injectStyles();
    var container=document.getElementById(CONTAINER_ID);
    if(!container)return;
    container.innerHTML=
      '<h2 class="sr-section-title">Reviews</h2>'+
      '<div id="sr-summary-container"></div>'+
      '<h3 class="sr-section-title" style="font-size:17px;margin-top:0">Reviews</h3>'+
      '<div id="sr-list"><div class="sr-empty">Carregando</div></div>'+
      '<div class="sr-form-card">'+
        '<div class="sr-form-title">Aval.</div>'+
        '<div class="sr-msg" id="sr-form-msg"></div>'+
        '<div class="sr-field"><label class="sr-label">Nome</label><input class="sr-input" id="sr-author" type="text" maxlength="80"/></div>'+
        '<div class="sr-field"><label class="sr-label">Nota</label><div class="sr-stars-input" id="sr-star-input"><span class="sr-star-input" data-v="1">★</span><span class="sr-star-input" data-v="2">★</span><span class="sr-star-input" data-v="3">★</span><span class="sr-star-input" data-v="4">★</span><span class="sr-star-input" data-v="5">★</span></div></div>'+
        '<div class="sr-field"><label class="sr-label">Coment.</label><textarea class="sr-textarea" id="sr-comment" maxlength="1000"></textarea></div>'+
        '<div class="sr-field"><label class="sr-label">Foto</label><label class="sr-photo-label" for="sr-photo"><span id="sr-photo-name">Foto</span></label><input type="file" id="sr-photo" accept="image/*" style="display:none"/><div id="sr-photo-grid" class="sr-photo-grid"></div></div>'+
        '<button class="sr-submit-btn" id="sr-submit-btn">Enviar</button>'+
        '<div id="sr-cupom" class="sr-msg success" style="display:none;text-align:center;font-weight:700">Parabéns! Você ganhou um cupom de desconto. Use <strong>PRESENTE</strong> na próxima compra.</div>'+
      '</div>'+
      '<div id="sr-lightbox" class="sr-lightbox"><span class="sr-lightbox-close" onclick="document.getElementById(\'sr-lightbox\').classList.remove(\'open\')">X</span><img src="" alt=""/></div>';
    bindForm();loadPage(1);removeDefaultNoReviews();watchNoReviews();
  }

  function reposition(){
    var w=document.getElementById(CONTAINER_ID);
    var d=document.querySelector('.descricao-produto,#descricao-produto,[itemprop="description"]');
    if(d&&d!==w)d.parentNode.insertBefore(w,d.nextSibling);
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',function(){
      init();
      setTimeout(reposition,300);
    });
  }else{
    init();
    setTimeout(reposition,300);
  }
})();
</script>
